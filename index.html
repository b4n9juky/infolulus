<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan SMKN 4 Bontang</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo-sekolah {
            width: 150px; /* Ukuran logo disesuaikan agar proporsional */
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            color: #1a4a2e;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.5;
            text-transform: uppercase;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1b5e20;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            border: 1px solid transparent;
        }
        .lulus {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        .tidak-lulus {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        .nama-siswa {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Mengacu langsung ke file LOGO.png -->
    <img src="logo_smk4.jpeg" alt="Logo SMKN 4 Bontang" class="logo-sekolah">
    
    <h1>PENGUMUMAN KELULUSAN<br>SMK NEGERI 4 BONTANG<br>TAHUN AJARAN 2025/2026</h1>
    
    <div class="form-group">
        <label for="nisn">NISN</label>
        <input type="text" id="nisn" placeholder="Masukkan 10 digit NISN">
    </div>
    
    <div class="form-group">
        <label for="tgl_lahir">Tanggal Lahir</label>
        <input type="date" id="tgl_lahir">
    </div>
    
    <button onclick="cekKelulusan()">Cek Hasil Kelulusan</button>

    <div id="result">
        <div id="displayNama" class="nama-siswa"></div>
        <div id="displayStatus"></div>
    </div>
</div>

<script>
    // Data siswa dari lampiran[cite: 1]
    const dataSiswa = [
        {nama: "Aldiansyah", nisn: "0069309369", tgl: "2007-07-15", status: "Lulus"},
        {nama: "ANDI DICKY PRATAMA SAPUTRA", nisn: "0079000805", tgl: "2007-01-12", status: "Lulus"},
        {nama: "ARIS DIANTO", nisn: "0077898278", tgl: "2007-03-17", status: "Lulus"},
        {nama: "DESTIAWAN HASLINDA", nisn: "0078728313", tgl: "2007-12-19", status: "Lulus"},
        {nama: "FIKA MARCELINA", nisn: "0086022816", tgl: "2008-03-04", status: "Lulus"},
        {nama: "HAFIZTH", nisn: "0081330314", tgl: "2008-07-24", status: "Lulus"},
        {nama: "HARIYATI", nisn: "0086831324", tgl: "2008-05-24", status: "Lulus"},
        {nama: "Indar Dhewi Permatasari", nisn: "0067588381", tgl: "2006-04-14", status: "Lulus"},
        {nama: "MARISA", nisn: "0072861608", tgl: "2007-12-06", status: "Lulus"},
        {nama: "MARSUKI", nisn: "0063323601", tgl: "2006-09-11", status: "Lulus"},
        {nama: "MARTHA ANGGRIANI", nisn: "0077460291", tgl: "2007-09-06", status: "Lulus"},
        {nama: "MAYANG SARI", nisn: "0079096759", tgl: "2007-01-22", status: "Lulus"},
        {nama: "MUH.FIQHI ZULQARNAEN", nisn: "0077607169", tgl: "2007-12-12", status: "Lulus"},
        {nama: "MUHAMMAD ALDY DWI SYAHPUTRA", nisn: "0081906318", tgl: "2008-01-06", status: "Lulus"},
        {nama: "Muhammad Fachri Safarian", nisn: "0086134734", tgl: "2008-02-17", status: "Lulus"},
        {nama: "Muhammad Faris Nur Alamsyah", nisn: "0062275092", tgl: "2006-01-19", status: "Lulus"},
        {nama: "MUHAMMAD IRWANSYAH", nisn: "0075092703", tgl: "2007-01-21", status: "Lulus"},
        {nama: "NUR SYAHRYANTI", nisn: "0061501199", tgl: "2006-10-30", status: "Lulus"},
        {nama: "PRINCESSA AURELYA SIREGAR", nisn: "0083682339", tgl: "2008-01-24", status: "Lulus"},
        {nama: "PUTRI AGUSTINA", nisn: "3082318775", tgl: "2008-08-17", status: "Lulus"},
        {nama: "Rafikul Akmal", nisn: "0073141352", tgl: "2007-12-04", status: "Lulus"},
        {nama: "RASYA ADITYA WARDANA", nisn: "0078089593", tgl: "2007-04-25", status: "Lulus"},
        {nama: "REYVAL YUSDIAWAN", nisn: "0073730300", tgl: "2007-09-10", status: "Lulus"},
        {nama: "RINI SRIDEWI", nisn: "0066418301", tgl: "2006-09-22", status: "Lulus"},
        {nama: "RUDIANSYAH", nisn: "0065296178", tgl: "2006-01-11", status: "Lulus"},
        {nama: "St. Navia", nisn: "0072514590", tgl: "2007-10-15", status: "Lulus"}
    ];

    function cekKelulusan() {
        const inputNisn = document.getElementById('nisn').value.trim();
        const inputTgl = document.getElementById('tgl_lahir').value;
        const resultDiv = document.getElementById('result');
        const displayNama = document.getElementById('displayNama');
        const displayStatus = document.getElementById('displayStatus');

        if (!inputNisn || !inputTgl) {
            alert("Harap masukkan NISN dan Tanggal Lahir.");
            return;
        }

        const siswa = dataSiswa.find(s => s.nisn === inputNisn && s.tgl === inputTgl);

        resultDiv.style.display = "block";

        if (siswa) {
            displayNama.innerText = siswa.nama;
            if (siswa.status === "Lulus") {
                resultDiv.className = "lulus";
                displayStatus.innerText = "SELAMAT ANDA LULUS";
            } else {
                resultDiv.className = "tidak-lulus";
                displayStatus.innerText = "MOHON MAAF ANDA BELUM LULUS";
            }
        } else {
            resultDiv.className = "tidak-lulus";
            displayNama.innerText = "Data tidak ditemukan";
            displayStatus.innerText = "Periksa kembali NISN dan Tanggal Lahir Anda.";
        }
    }
</script>

</body>
</html>
